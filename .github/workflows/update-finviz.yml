name: Update Finviz Breadth

on:
  workflow_dispatch:
  schedule:
    # GitHub cron is UTC. These candidate times are guarded below so delivery
    # happens only at 9:30 AM Asia/Amman time.
    - cron: "30 6 * * *"
    - cron: "30 7 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Check Jordan delivery window
        if: github.event_name == 'schedule'
        shell: bash
        run: |
          jordan_time="$(TZ=Asia/Amman date +%H:%M)"
          echo "Jordan time: ${jordan_time}"
          if [[ "${jordan_time}" != "09:30" ]]; then
            echo "skip_update=true" >> "${GITHUB_ENV}"
            echo "Skipping non-matching Jordan delivery window."
          fi

      - name: Check out repository
        if: env.skip_update != 'true'
        uses: actions/checkout@v4

      - name: Set up Python
        if: env.skip_update != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: env.skip_update != 'true'
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Run Finviz breadth updater
        if: env.skip_update != 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python finviz_breadth_updater.py

      - name: Commit updated breadth files
        if: env.skip_update != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add finviz_breadth.csv finviz_breadth.xlsx finviz_breadth_log.txt
          if git diff --cached --quiet; then
            echo "No breadth file changes to commit."
          else
            git commit -m "Update Finviz breadth data"
            git push
          fi
