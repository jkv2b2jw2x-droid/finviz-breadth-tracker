name: Update Finviz Breadth

on:
  workflow_dispatch:
  schedule:
    # 5:47 PM New York during daylight saving time.
    - cron: "47 21 * * 1-5"
    # 5:47 PM New York during standard time.
    - cron: "47 22 * * 1-5"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Check New York schedule window
        if: github.event_name == 'schedule'
        shell: bash
        run: |
          ny_time="$(TZ=America/New_York date +%H:%M)"
          echo "New York time: ${ny_time}"
          if [[ "${ny_time}" != 17:* ]]; then
            echo "skip_update=true" >> "${GITHUB_ENV}"
            echo "Skipping duplicate seasonal schedule run."
          fi

      - name: Check out repository
        if: env.skip_update != 'true'
        uses: actions/checkout@v4

      - name: Set up Python
        if: env.skip_update != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: env.skip_update != 'true'
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Run Finviz breadth updater
        if: env.skip_update != 'true'
        run: python finviz_breadth_updater.py

      - name: Commit updated breadth files
        if: env.skip_update != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add finviz_breadth.csv finviz_breadth.xlsx finviz_breadth_log.txt
          if git diff --cached --quiet; then
            echo "No breadth file changes to commit."
          else
            git commit -m "Update Finviz breadth data"
            git push
          fi
